services:
  - type: web
    name: ticket-system
    env: python
    plan: free
    buildCommand: |
      cd frontend && npm install && npm run build && cd .. && \
      rm -rf backend/frontend_dist && cp -r frontend/dist backend/frontend_dist
    startCommand: gunicorn web_run:app --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 2 --max-requests 1000 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ticket-system-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: CORS_ORIGINS
        value: "*"

databases:
  - name: ticket-system-db
    plan: free
    databaseName: ticket_system
    ipAllowList: []
