services:
  - type: web
    name: ticket-system
    env: python
    buildCommand: |
      cd frontend && npm install && npm run build && cd .. && \
      cp -r frontend/dist backend/frontend_dist
    startCommand: gunicorn web_run:app --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 4 --max-requests 1000 --timeout 120
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./backend/data/ticket_system.db
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10.13
